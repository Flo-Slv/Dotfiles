########################
## TMUX CONFIGURATION ##
########################

# by Flo Slv

# ~/.tmux.conf


# Add color for VIM and NEOVIM.
# set -g default-terminal "xterm-256color" # FOR VIM
set -g default-terminal "screen-256color" # FOR NEOVIM
set -ga terminal-overrides ",*256col*:Tc"


####################
# KEYBOARD CHANGES #
####################

# control + b become control + z.
set -g prefix C-z
unbind C-b
bind C-z send-prefix

# control + arrows to navigate between windows.
bind-key -n C-l next
bind-key -n C-h prev

# alt + arrows to navigate between panels.
bind-key -n M-h select-pane -L
bind-key -n M-l select-pane -R
bind-key -n M-k select-pane -U
bind-key -n M-j select-pane -D


##################
# USEFUL CHANGES #
##################

# Can use mouse inside Tmux.
set -g mouse on

# Reload configuration.
bind r source-file ~/Flo/Dotfiles/tmux/.tmux.conf \; display '.tmux.conf sourced !'

# Resize panes with C-z + arrows.
bind right resize-pane -R 10
bind left resize-pane -L 10
bind up resize-pane -U 10
bind down resize-pane -D 10

# x to do an vertical split.
bind x split-window -h
# s to do an horizontal split.
bind s split-window -v

# Increase history limit from 2000 to 5000 lines.
set-option -g history-limit 5000

# To avoid Neovim warning
set-option -sg escape-time 10


##################
# VISUAL CHANGES #
##################

set -g base-index 1            # Start windows numbering at 1.
set -g pane-base-index 1       # Make pane numbering consistent with windows.

setw -g automatic-rename on    # Rename window to reflect current program.
set -g renumber-windows on     # Renumber windows when a window is closed.

set -g set-titles on           # Set terminal title.

set -g display-panes-time 800  # Slightly longer pane indicators display time.
set -g display-time 2000       # Slightly longer status messages display time.

# Activity
# set -g monitor-activity on
# set -g visual-activity

# Non active panes in grey.
set-option -g pane-border-style fg=colour244

# Active pane in red.
set-option -g pane-active-border-style fg=colour124

# Change text color for non active and active panes.
set-window-option -g window-style fg=colour247
set-window-option -g window-active-style fg=colour255

# Status right bar to display df -h
# set -g status-right '/ #{df_avail}O #{df_percent}'

# Tmux powerline
set-option -g status on
set-option -g status-interval 1        # Redraw status every 1 sec.
set-option -g status-justify "centre"
set-option -g status-left-length 60
set-option -g status-right-length 90
set-option -g status-left "#(~/Flo/Dotfiles/tmux/.tmux/plugins/tmux-powerline/powerline.sh left)"
set-option -g status-right "#(~/Flo/Dotfiles/tmux/.tmux/plugins/tmux-powerline/powerline.sh right)"

# Prettifies the window-status segments.
set-hook -g session-created 'run-shell "~/Flo/Dotfiles/tmux/.tmux/plugins/tmux-powerline/powerline.sh init"'


###########
# PLUGINS #
###########

# List of plugins
set -g @plugin 'tmux-plugins/tpm'          # TMUX plugin manager.
set -g @plugin 'tassaron/tmux-df'          # Output df -h in Tmux statusbar.

# Initialize TMUX plugin manager
# (keep this line at the very bottom of tmux.conf)
run '~/Flo/Dotfiles/tmux/.tmux/plugins/tpm/tpm'
